name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ thecgs }}&show_icons=true
          path: profile/stats.svg
          token: ${{ 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 }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ thecgs }}&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ 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 }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=readme-tools&repo=github-readme-stats
          path: profile/pin-readme-tools-github-readme-stats.svg
          token: ${{ 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 }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
